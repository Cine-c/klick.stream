name = "klick"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

routes = [
  { pattern = "klick.stream/*", zone_name = "klick.stream" },
  { pattern = "www.klick.stream/*", zone_name = "klick.stream" },
]

# Non-secret runtime vars only. Secrets (TMDB_API_KEY, OMDB_API_KEY, STRIPE_SECRET_KEY,
# STRIPE_WEBHOOK_SECRET, FIREBASE_PRIVATE_KEY, FIREBASE_SERVICE_ACCOUNT_EMAIL, GNEWS_API_KEY,
# APISPORTS_KEY) must be set via `wrangler secret put <NAME>` or the Cloudflare dashboard —
# never committed here. NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY and the price ID are public by design.
[vars]
NODE_ENV = "production"
STRIPE_MONTHLY_PRICE_ID = "price_1T6DxQQlk386numjl8clWeZ0"
NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_51T6DqEQlk386numjXRUz0HtVuD3Q36GNaiOKTKb45hI1sxN5CGIzjC0SuN9nXCBF6U8SMaGDOYyaaEGoone4YQsD00QUrVMxC3"
